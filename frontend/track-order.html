<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FoodLens AI | Track Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --deep: #08060f;
  --sidebar-bg: #0d0a1a;
  --card-bg: #110e1c;
  --surface: #160f26;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text: #f2eeff;
  --muted: #8b82a8;
  --muted2: #5c5474;
  --violet: #7c4dff;
  --pink: #e040d0;
  --teal: #1de9b6;
  --orange: #ff6b2b;
  --gold: #f5c842;
  --rose: #ff4d6d;
  --green: #22c55e;
  --sidebar-w: 260px;
}

html, body { height:100%; overflow:hidden; }
body {
  background: var(--deep);
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--text);
  display: flex;
}

/* ===== AURORA ===== */
.aurora { position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none; }
.orb { position:absolute;border-radius:50%;filter:blur(100px);opacity:0; }
.orb1{width:600px;height:600px;background:radial-gradient(circle,#7c4dff44,#e040d022);top:-200px;left:-100px;animation:orbFloat 18s ease-in-out infinite alternate,orbIn 1.5s 0.3s forwards;}
.orb2{width:500px;height:500px;background:radial-gradient(circle,#1de9b633,#7c4dff22);bottom:-150px;right:-100px;animation:orbFloat 22s 1s ease-in-out infinite alternate,orbIn 1.5s 0.6s forwards;}
.orb3{width:350px;height:350px;background:radial-gradient(circle,#ff6b2b2a,#f5c84218);top:40%;left:50%;animation:orbFloat 16s 2s ease-in-out infinite alternate,orbIn 1.5s 0.9s forwards;}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,-60px) scale(1.1);}100%{transform:translate(-30px,40px) scale(0.95);}}
@keyframes orbIn{to{opacity:1;}}

.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:60px 60px;}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar-w);height:100vh;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;z-index:10;overflow:hidden;}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7c4dff,#e040d0,#ff6b2b,#f5c842,#1de9b6,#7c4dff);background-size:300%;animation:gradSlide 5s linear infinite;}
@keyframes gradSlide{0%{background-position:0%;}100%{background-position:300%;}}

.sidebar-head{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.s-logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#7c4dff,#e040d0);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px rgba(124,77,255,0.45);flex-shrink:0;animation:logoPulse 3s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{box-shadow:0 0 16px rgba(124,77,255,0.45);}50%{box-shadow:0 0 28px rgba(224,64,208,0.6);}}
.s-brand{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;background:linear-gradient(90deg,#c9b8ff,#f0a0e0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s-sub{font-size:0.63rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--teal);display:block;margin-top:1px;}

.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.nav-section-label{font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted2);font-weight:600;padding:8px 10px 4px;margin-top:4px;}
.nav-btn{width:100%;padding:10px 14px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:12px;display:flex;align-items:center;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.82rem;font-weight:500;transition:all 0.22s;text-align:left;position:relative;text-decoration:none;box-sizing:border-box;}
.nav-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;background:rgba(255,255,255,0.05);flex-shrink:0;transition:all 0.22s;}
.nav-btn:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.nav-btn:hover .nav-icon{background:rgba(124,77,255,0.15);}
.nav-btn.active{background:rgba(124,77,255,0.14);color:var(--text);border:1px solid rgba(124,77,255,0.22);}
.nav-btn.active .nav-icon{background:rgba(124,77,255,0.25);}
.nav-btn.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;border-radius:0 3px 3px 0;background:var(--violet);}
.nav-btn.danger{color:var(--rose);}
.nav-btn.danger:hover{background:rgba(255,77,109,0.1);color:var(--rose);}

.sidebar-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#7c4dff,#1de9b6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.user-info strong{display:block;font-size:0.76rem;font-weight:600;color:var(--text);}
.user-info span{font-size:0.66rem;color:var(--muted2);}

/* ===== MAIN ===== */
.main{flex:1;height:100vh;overflow-y:auto;margin-left:var(--sidebar-w);position:relative;z-index:1;display:flex;flex-direction:column;}

.topbar{height:64px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(8,6,15,0.65);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
.topbar h1{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:600;background:linear-gradient(90deg,#fff,#c9b8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-pill{padding:7px 14px;border:1px solid var(--border);border-radius:50px;font-size:0.72rem;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px;}

/* ===== CONTENT ===== */
.content{flex:1;padding:32px;max-width:860px;margin:0 auto;width:100%;}

/* ===== ORDER ID SEARCH ===== */
.search-bar{
  display:flex;align-items:center;gap:12px;
  background:var(--card-bg);border:1px solid var(--border);border-radius:16px;
  padding:14px 18px;margin-bottom:28px;
  opacity:0;transform:translateY(16px);
  animation:fadeUp 0.5s 0.1s ease forwards;
}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
.search-bar span{font-size:18px;flex-shrink:0;}
.search-bar input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;color:var(--text);
}
.search-bar input::placeholder{color:var(--muted2);}
.btn-track{
  padding:9px 22px;border:none;border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;font-weight:700;
  color:#fff;cursor:pointer;
  background:linear-gradient(135deg,#7c4dff,#e040d0);
  transition:all 0.22s;box-shadow:0 4px 14px rgba(124,77,255,0.3);white-space:nowrap;
}
.btn-track:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(224,64,208,0.4);}

/* ===== STATUS HERO ===== */
.status-hero{
  background:var(--card-bg);border:1px solid var(--border);border-radius:24px;
  padding:28px 32px;margin-bottom:24px;
  position:relative;overflow:hidden;
  opacity:0;transform:translateY(20px);
  animation:fadeUp 0.5s 0.15s ease forwards;
}
.status-hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#7c4dff,#e040d0,#ff6b2b,#f5c842,#1de9b6,#7c4dff);
  background-size:300%;animation:gradSlide 5s linear infinite;
}

.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px;}
.order-id-wrap{}
.order-id-label{font-size:0.67rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px;}
.order-id-val{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:var(--text);}

.status-badge-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.status-badge{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:50px;
  font-size:0.78rem;font-weight:700;letter-spacing:0.06em;
  border:1px solid;
}
.sb-placed   {color:#a88bff;border-color:rgba(124,77,255,0.4);background:rgba(124,77,255,0.12);}
.sb-preparing{color:#f5c842;border-color:rgba(245,200,66,0.4);background:rgba(245,200,66,0.1);}
.sb-onway    {color:#ff6b2b;border-color:rgba(255,107,43,0.4);background:rgba(255,107,43,0.1);}
.sb-delivered{color:#1de9b6;border-color:rgba(29,233,182,0.4);background:rgba(29,233,182,0.1);}
.sb-cancelled{color:var(--rose);border-color:rgba(255,77,109,0.35);background:rgba(255,77,109,0.08);}

.status-dot-anim{width:8px;height:8px;border-radius:50%;animation:statusPulse 1.5s ease-in-out infinite;}
.dot-violet{background:#a88bff;box-shadow:0 0 8px #a88bff;}
.dot-gold  {background:#f5c842;box-shadow:0 0 8px #f5c842;}
.dot-orange{background:#ff6b2b;box-shadow:0 0 8px #ff6b2b;}
.dot-teal  {background:#1de9b6;box-shadow:0 0 8px #1de9b6;}
@keyframes statusPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}

.eta-pill{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:50px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  font-size:0.75rem;color:var(--muted);
}
.eta-time{color:var(--gold);font-weight:700;}

/* ===== PROGRESS STEPS ===== */
.steps-wrap{position:relative;padding:0 8px;}

.steps-line-track{
  position:absolute;top:22px;left:calc(8px + 22px);
  right:calc(8px + 22px);height:3px;
  background:rgba(255,255,255,0.06);border-radius:2px;
  z-index:0;
}
.steps-line-fill{
  position:absolute;top:0;left:0;height:100%;
  background:linear-gradient(90deg,#7c4dff,#e040d0,#ff6b2b,#1de9b6);
  border-radius:2px;
  transition:width 1.2s cubic-bezier(0.22,1,0.36,1);
  width:0%;
}

.steps-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:0;position:relative;z-index:1;
}

.step{display:flex;flex-direction:column;align-items:center;gap:10px;}

.step-circle{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  background:rgba(255,255,255,0.04);
  border:2px solid rgba(255,255,255,0.1);
  transition:all 0.6s cubic-bezier(0.22,1,0.36,1);
  position:relative;
  flex-shrink:0;
}
.step-circle.done{
  background:linear-gradient(135deg,#7c4dff,#e040d0);
  border-color:transparent;
  box-shadow:0 0 20px rgba(124,77,255,0.5);
  animation:stepPop 0.5s ease;
}
.step-circle.active{
  background:rgba(124,77,255,0.2);
  border-color:#7c4dff;
  box-shadow:0 0 24px rgba(124,77,255,0.4);
  animation:stepGlow 2s ease-in-out infinite;
}
@keyframes stepPop{0%{transform:scale(0.8);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
@keyframes stepGlow{0%,100%{box-shadow:0 0 16px rgba(124,77,255,0.4);}50%{box-shadow:0 0 32px rgba(224,64,208,0.7);}}

.step-check{
  position:absolute;top:-4px;right:-4px;
  width:16px;height:16px;border-radius:50%;
  background:#1de9b6;border:2px solid var(--card-bg);
  display:flex;align-items:center;justify-content:center;
  font-size:8px;color:#04342c;font-weight:800;
  opacity:0;transform:scale(0);
  transition:all 0.3s 0.4s cubic-bezier(0.22,1,0.36,1);
}
.step-circle.done .step-check{opacity:1;transform:scale(1);}

.step-label{font-size:0.75rem;font-weight:600;color:var(--muted2);text-align:center;transition:color 0.4s;line-height:1.4;}
.step.done .step-label,.step.active .step-label{color:var(--text);}

.step-time{font-size:0.66rem;color:var(--muted2);text-align:center;transition:color 0.4s;}
.step.done .step-time{color:var(--teal);}
.step.active .step-time{color:var(--gold);}

/* ===== ORDER SUMMARY ===== */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px;}

.summary-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:20px;
  padding:22px 24px;
  opacity:0;transform:translateY(16px);
  animation:fadeUp 0.5s ease forwards;
}
.summary-card:nth-child(1){animation-delay:0.25s;}
.summary-card:nth-child(2){animation-delay:0.35s;}

.summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.3s;border-radius:20px 20px 0 0;}
.summary-card{position:relative;overflow:hidden;}
.summary-card:nth-child(1)::before{background:linear-gradient(90deg,#7c4dff,#e040d0);}
.summary-card:nth-child(2)::before{background:linear-gradient(90deg,#ff6b2b,#f5c842);}
.summary-card:hover::before{opacity:1;}

.card-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ci-v{background:rgba(124,77,255,0.18);}
.ci-o{background:rgba(255,107,43,0.15);}
.card-head h3{font-family:'Fraunces',serif;font-size:0.95rem;font-weight:600;}

/* Items list */
.order-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.order-item:last-child{border-bottom:none;}
.item-left{display:flex;align-items:center;gap:10px;}
.item-img{width:36px;height:36px;border-radius:8px;object-fit:cover;background:#1a1425;flex-shrink:0;}
.item-name{font-size:0.82rem;font-weight:500;color:var(--text);}
.item-qty{font-size:0.7rem;color:var(--muted);margin-top:1px;}
.item-price{font-size:0.82rem;font-weight:600;color:#f5c842;}

.total-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
.total-row span{font-size:0.78rem;color:var(--muted);}
.total-row strong{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;color:#f5c842;}

/* Delivery info */
.info-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.info-row:last-child{border-bottom:none;}
.info-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px;}
.info-label{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:2px;}
.info-val{font-size:0.83rem;color:var(--text);font-weight:500;}

/* Admin update panel */
.admin-panel{
  background:var(--card-bg);border:1px solid rgba(124,77,255,0.2);border-radius:20px;
  padding:22px 24px;margin-top:24px;
  opacity:0;transform:translateY(16px);
  animation:fadeUp 0.5s 0.45s ease forwards;
  position:relative;overflow:hidden;
  display:none;
}
.admin-panel.show{display:block;}
.admin-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7c4dff,#1de9b6);}
.admin-panel-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.admin-panel-head h3{font-family:'Fraunces',serif;font-size:0.95rem;font-weight:600;}
.status-btns{display:flex;gap:10px;flex-wrap:wrap;}
.status-btn{
  padding:9px 18px;border-radius:10px;border:1px solid var(--border);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:0.78rem;font-weight:600;
  cursor:pointer;background:rgba(255,255,255,0.04);color:var(--muted);
  transition:all 0.22s;
}
.status-btn:hover{border-color:var(--border-hover);color:var(--text);}
.status-btn.sb-placed-btn:hover  {background:rgba(124,77,255,0.15);border-color:rgba(124,77,255,0.4);color:#a88bff;}
.status-btn.sb-prep-btn:hover    {background:rgba(245,200,66,0.12);border-color:rgba(245,200,66,0.4);color:#f5c842;}
.status-btn.sb-onway-btn:hover   {background:rgba(255,107,43,0.12);border-color:rgba(255,107,43,0.4);color:#ff6b2b;}
.status-btn.sb-delivered-btn:hover{background:rgba(29,233,182,0.12);border-color:rgba(29,233,182,0.4);color:#1de9b6;}
.status-btn.sb-cancel-btn:hover  {background:rgba(255,77,109,0.1);border-color:rgba(255,77,109,0.35);color:var(--rose);}

/* Empty / loading state */
.empty-state{padding:60px 20px;text-align:center;}
.empty-icon{font-size:48px;opacity:0.25;margin-bottom:16px;}
.empty-state h3{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:600;margin-bottom:8px;color:var(--text);}
.empty-state p{font-size:0.83rem;color:var(--muted);line-height:1.7;}

/* Toast */
.toast{position:fixed;top:24px;right:-420px;min-width:290px;padding:14px 18px;border-radius:16px;background:var(--card-bg);border:1px solid var(--border);font-size:0.82rem;font-weight:600;color:var(--text);box-shadow:0 10px 40px rgba(0,0,0,0.5);transition:right 0.5s cubic-bezier(0.22,1,0.36,1);z-index:9999;display:flex;align-items:center;gap:10px;}
.toast.show{right:24px;}
.toast.success{border-left:3px solid #1de9b6;}
.toast.error{border-left:3px solid var(--rose);}

@media(max-width:860px){
  .sidebar{display:none;} .main{margin-left:0;}
  .two-col{grid-template-columns:1fr;}
  .steps-row{grid-template-columns:repeat(2,1fr);gap:16px;}
  .steps-line-track{display:none;}
}

/* ========================================
   MOBILE RESPONSIVE
======================================== */
@media (max-width: 900px) {
  .sidebar { display:none !important; }
  .main    { margin-left:0 !important; }
  .layout  { flex-direction:column !important; padding:16px !important; gap:16px !important; }
  .left,.right,.left-panel,.right-panel,.left-form { width:100% !important; min-height:unset !important; }
  .two-col,.analytics-grid,.form-grid { grid-template-columns:1fr !important; }
  .stats-grid,.analytics-stats,.summary-strip,.revenue-highlight { grid-template-columns:1fr 1fr !important; }
  .hero-inner { flex-direction:column !important; gap:32px !important; }
  .hero-visual { width:100% !important; }
  .about-cards,.features-grid { grid-template-columns:1fr !important; }
  .stats-inner { grid-template-columns:1fr 1fr !important; }
}
@media (max-width: 600px) {
  body { overflow-x:hidden; }
  .topbar { padding:0 16px !important; height:56px !important; }
  .topbar h1,.topbar-title { font-size:1rem !important; }
  .topbar-left p,.topbar-pill { display:none !important; }
  .sidebar { display:none !important; }
  .main { margin-left:0 !important; }
  .content { padding:14px !important; }
  .section { padding:48px 20px !important; }
  .layout { padding:12px !important; }
  nav { padding:0 16px !important; }
  .nav-links { display:none !important; }
  .stats-grid,.analytics-stats,.summary-strip,.revenue-highlight,
  .two-col,.analytics-grid,.form-grid,.notif-form-grid,
  .social-row,.social-btns { grid-template-columns:1fr !important; }
  .food-grid { grid-template-columns:repeat(2,1fr) !important; gap:10px !important; }
  .card,.form-card,.chart-card,.order-card,.summary-card,.stat-card { border-radius:14px !important; padding:14px !important; }
  .hero-title,.headline { font-size:1.9rem !important; }
  .hero-inner { flex-direction:column !important; }
  .hero-visual { display:none; }
  #home > div { padding:80px 20px 40px !important; }
  .profile-hero { padding:16px !important; flex-wrap:wrap !important; }
  .profile-stats { display:none !important; }
  .tabs { flex-wrap:wrap !important; }
  .tab-btn { flex:1 1 40% !important; font-size:0.72rem !important; padding:8px !important; }
  .steps-row { grid-template-columns:repeat(2,1fr) !important; gap:14px !important; }
  .steps-line-track { display:none !important; }
  .cart-panel { width:100vw !important; right:0 !important; }
  .main.cart-open { margin-right:0 !important; }
  .notif-panel { width:calc(100vw - 20px) !important; right:10px !important; left:10px !important; }
  .btn-save,.btn-submit,.btn-recommend { width:100% !important; }
  .panel-foot { flex-direction:column !important; align-items:stretch !important; }
  .panel-foot .btn-save,.panel-foot .btn-secondary { width:100% !important; }
  .right-panel { padding:20px 16px !important; }
  .left-panel { display:none !important; }
  .form-wrap { padding:0 !important; }
  .form-full { grid-column:1 !important; }
  .table-wrap { overflow-x:auto !important; }
  table { min-width:480px; }
  .search-bar { flex-wrap:wrap !important; }
  .search-bar input { flex:1 1 100% !important; }
  .btn-track { width:100% !important; }
  .mood-pills,.diet-pills,.diet-tags,.tag-row,.dz-actions { flex-wrap:wrap !important; gap:8px !important; }
  .section-title { font-size:1.5rem !important; }
  .sec-head h2,.section-header h2 { font-size:1rem !important; }
  .chat-window { width:100vw !important; right:0 !important; border-radius:20px 20px 0 0 !important; }
  .chat-fab { bottom:14px !important; right:14px !important; }
  .stat-num,.an-stat-num,.scard-num { font-size:1.3rem !important; }
  .oc-top,.oc-bottom { flex-direction:column !important; align-items:flex-start !important; gap:8px !important; }
  .oc-meta { flex-wrap:wrap !important; gap:6px !important; }
  .hero-text h2 { font-size:1.8rem !important; }
  .hero-text p,.hero-sub { font-size:0.85rem !important; }
  .rest-row { gap:8px !important; }
  .rest-chip { padding:8px 12px !important; font-size:0.78rem !important; }
  .form-grid { grid-template-columns:1fr !important; }
  .notif-form-grid { grid-template-columns:1fr !important; }
  .summary-strip { grid-template-columns:1fr 1fr !important; }
  .revenue-highlight { grid-template-columns:1fr !important; }
  .an-stat { padding:12px 14px !important; }
}


/* ── Hamburger menu ── */
.hamburger {
  display:none;width:38px;height:38px;border-radius:10px;
  border:1px solid var(--border);background:rgba(255,255,255,0.04);
  align-items:center;justify-content:center;cursor:pointer;
  font-size:18px;flex-shrink:0;transition:all 0.2s;
}
.hamburger:hover{border-color:var(--border-hover);background:rgba(124,77,255,0.1);}
@media(max-width:900px){.hamburger{display:flex;}}

/* Mobile sidebar overlay */
.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
  z-index:99;
}
.sidebar-overlay.show{display:block;}
.sidebar.mobile-open{
  display:flex !important;
  position:fixed;left:0;top:0;z-index:100;
  transform:translateX(0) !important;
  animation:slideInSidebar 0.3s cubic-bezier(0.22,1,0.36,1);
}
@keyframes slideInSidebar{from{transform:translateX(-100%);}to{transform:translateX(0);}}

</style>
</head>
<body>

<div class="aurora">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
</div>
<div class="grid-overlay"></div>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <div class="sidebar-head">
    <div class="s-logo">🍽</div>
    <div><div class="s-brand">FoodLens AI</div><span class="s-sub">User Dashboard</span></div>
  </div>
  <div class="sidebar-nav">
    <span class="nav-section-label">Explore</span>
    <a href="user-dashboard.html" class="nav-btn"><div class="nav-icon">🏠</div> Home</a>
    <a href="user-dashboard.html" class="nav-btn"><div class="nav-icon">🍽</div> Restaurants</a>
    <a href="#" class="nav-btn active"><div class="nav-icon">📦</div> My Orders</a>
    <span class="nav-section-label">Account</span>
    <a href="profile.html" class="nav-btn"><div class="nav-icon">👤</div> Profile</a>
    <button class="nav-btn danger" onclick="logout()"><div class="nav-icon">🔐</div> Logout</button>
  </div>
  <div class="sidebar-footer">
    <div class="user-avatar" id="sidebarAvatar">U</div>
    <div class="user-info">
      <strong id="sidebarName">Loading...</strong>
      <span id="sidebarDiet">Member</span>
    </div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="topbar">
    <h1>Track Your Order</h1>
    <button class="hamburger" onclick="openMobileSidebar()" aria-label="Menu">☰</button>
      <div class="topbar-right">
      <div class="topbar-pill">🕐 <span id="clock">--:--</span></div>
    </div>
  </div>

  <div class="content">

    <!-- Search bar -->
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="orderIdInput" placeholder="Enter order ID  e.g. #1042" oninput="handleInput(this)">
      <button class="btn-track" onclick="loadOrder()">Track Order</button>
    </div>

    <!-- Dynamic content area -->
    <div id="trackingContent">
      <div class="empty-state">
        <div class="empty-icon">📦</div>
        <h3>Enter your order ID</h3>
        <p>Type your order ID above to see real-time<br>delivery status and tracking details.</p>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg">Done!</span></div>

<script>
const API = "";
const token = localStorage.getItem("token");
const role  = JSON.parse(localStorage.getItem("user") || "{}").role || "user";
if (!token) location.href = "login.html";

const STEPS = [
  { key:"placed",    label:"Order Placed",  icon:"🛒", desc:"We received your order" },
  { key:"preparing", label:"Preparing",     icon:"👨‍🍳", desc:"Kitchen is cooking"    },
  { key:"on_the_way",label:"On the Way",    icon:"🛵", desc:"Rider is heading to you" },
  { key:"delivered", label:"Delivered",     icon:"✅", desc:"Enjoy your meal!"        },
];

const STATUS_IDX = { placed:0, preparing:1, on_the_way:2, delivered:3, cancelled:-1 };

const BADGE_MAP = {
  placed:    { cls:"sb-placed",    dot:"dot-violet", label:"Order Placed"  },
  preparing: { cls:"sb-preparing", dot:"dot-gold",   label:"Preparing"     },
  on_the_way:{ cls:"sb-onway",     dot:"dot-orange",  label:"On the Way"    },
  delivered: { cls:"sb-delivered", dot:"dot-teal",    label:"Delivered"     },
  cancelled: { cls:"sb-cancelled", dot:"",            label:"Cancelled"     },
};

let currentOrderId = null;
let pollTimer = null;

/* ===== CLOCK ===== */
function updateClock(){
  const n=new Date();
  document.getElementById("clock").textContent=n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0");
}
updateClock(); setInterval(updateClock,10000);

/* ===== LOAD USER ===== */
fetch(API+"/api/profile",{headers:{Authorization:"Bearer "+token}})
  .then(r=>r.json()).then(d=>{
    const u=d.user||d;
    const letter=(u.name||"U")[0].toUpperCase();
    document.getElementById("sidebarAvatar").textContent=letter;
    document.getElementById("sidebarName").textContent=u.name||"—";
    document.getElementById("sidebarDiet").textContent=u.diet_pref||"Member";
  }).catch(()=>{});

/* ===== INPUT HANDLER — auto track on Enter ===== */
function handleInput(el){
  el.value = el.value.replace(/[^0-9#]/g,"");
}
document.getElementById("orderIdInput").addEventListener("keydown", e=>{
  if(e.key==="Enter") loadOrder();
});

/* ===== AUTO-LOAD FROM URL param ===== */
window.addEventListener("load", ()=>{
  const params = new URLSearchParams(window.location.search);
  const oid = params.get("order");
  if(oid){
    document.getElementById("orderIdInput").value = "#" + oid;
    loadOrder();
  }
});

/* ===== LOAD ORDER ===== */
async function loadOrder(){
  let raw = document.getElementById("orderIdInput").value.trim().replace("#","");
  if(!raw){ showToast("Please enter an order ID","error"); return; }

  currentOrderId = raw;
  document.getElementById("trackingContent").innerHTML = `
    <div class="empty-state">
      <div class="empty-icon" style="animation:spin 1s linear infinite;display:inline-block;">⟳</div>
      <h3>Loading order...</h3>
    </div>`;

  try{
    const res  = await fetch(`${API}/api/orders/${raw}/track`,{headers:{Authorization:"Bearer "+token}});
    const data = await res.json();

    if(!res.ok) throw new Error(data.message||"Order not found");
    renderTracking(data);

    // Poll every 15 seconds for live updates
    clearInterval(pollTimer);
    if(data.status !== "delivered" && data.status !== "cancelled"){
      pollTimer = setInterval(()=> pollStatus(raw), 15000);
    }

  }catch(err){
    document.getElementById("trackingContent").innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">❌</div>
        <h3>Order not found</h3>
        <p>${err.message||"Check your order ID and try again."}</p>
      </div>`;
    showToast(err.message||"Order not found","error");
  }
}

/* ===== POLL FOR UPDATES ===== */
async function pollStatus(id){
  try{
    const res  = await fetch(`${API}/api/orders/${id}/track`,{headers:{Authorization:"Bearer "+token}});
    const data = await res.json();
    if(res.ok) renderTracking(data);
    if(data.status==="delivered"||data.status==="cancelled") clearInterval(pollTimer);
  }catch(_){}
}

/* ===== RENDER TRACKING ===== */
function renderTracking(order){
  const idx     = STATUS_IDX[order.status] ?? 0;
  const badge   = BADGE_MAP[order.status] || BADGE_MAP.placed;
  const linePct = order.status==="cancelled" ? 0 : Math.round((idx/(STEPS.length-1))*100);

  const stepsHTML = STEPS.map((s,i)=>{
    const isDone   = i < idx;
    const isActive = i === idx && order.status !== "cancelled";
    const cls = isDone?"done":isActive?"active":"";
    const timeLabel = order.step_times?.[s.key]
      ? formatTime(order.step_times[s.key])
      : (isActive ? "Now" : (isDone ? "Done" : "—"));
    return `
    <div class="step ${cls}">
      <div class="step-circle ${cls}">
        <span>${s.icon}</span>
        <div class="step-check">✓</div>
      </div>
      <div class="step-label">${s.label}</div>
      <div class="step-time">${timeLabel}</div>
    </div>`;
  }).join("");

  const itemsHTML = (order.items||[]).map(it=>`
    <div class="order-item">
      <div class="item-left">
        <img class="item-img" src="${API}/uploads/${it.image||''}" onerror="this.style.background='#2a2035';this.removeAttribute('src')">
        <div>
          <div class="item-name">${it.name}</div>
          <div class="item-qty">x${it.quantity||1}</div>
        </div>
      </div>
      <div class="item-price">£${(it.price*(it.quantity||1)).toFixed(2)}</div>
    </div>`).join("");

  const total = (order.items||[]).reduce((a,i)=>a+(i.price*(i.quantity||1)),0);

  const etaText = order.status==="delivered"
    ? "Delivered ✓"
    : order.status==="cancelled"
    ? "Cancelled"
    : order.eta
    ? `~${order.eta} min`
    : "Calculating...";

  const adminPanel = role==="admin" ? `
    <div class="admin-panel show" id="adminPanel">
      <div class="admin-panel-head">
        <div class="card-icon ci-v">⚙️</div>
        <h3>Admin — Update Status</h3>
      </div>
      <div class="status-btns">
        <button class="status-btn sb-placed-btn"    onclick="updateStatus('placed')">🛒 Placed</button>
        <button class="status-btn sb-prep-btn"      onclick="updateStatus('preparing')">👨‍🍳 Preparing</button>
        <button class="status-btn sb-onway-btn"     onclick="updateStatus('on_the_way')">🛵 On the Way</button>
        <button class="status-btn sb-delivered-btn" onclick="updateStatus('delivered')">✅ Delivered</button>
        <button class="status-btn sb-cancel-btn"    onclick="updateStatus('cancelled')">❌ Cancel</button>
      </div>
    </div>` : "";

  document.getElementById("trackingContent").innerHTML = `

    <!-- Status Hero -->
    <div class="status-hero">
      <div class="hero-top">
        <div class="order-id-wrap">
          <div class="order-id-label">Order ID</div>
          <div class="order-id-val">#${order.id}</div>
        </div>
        <div class="status-badge-wrap">
          <div class="status-badge ${badge.cls}">
            ${badge.dot ? `<span class="status-dot-anim ${badge.dot}"></span>` : ""}
            ${badge.label}
          </div>
          <div class="eta-pill">⏱ ETA: <span class="eta-time">${etaText}</span></div>
        </div>
      </div>

      <!-- Steps -->
      <div class="steps-wrap">
        <div class="steps-line-track">
          <div class="steps-line-fill" id="stepsLineFill"></div>
        </div>
        <div class="steps-row">${stepsHTML}</div>
      </div>
    </div>

    <!-- Summary -->
    <div class="two-col">
      <div class="summary-card">
        <div class="card-head">
          <div class="card-icon ci-v">🧾</div>
          <h3>Order Summary</h3>
        </div>
        ${itemsHTML||'<p style="font-size:0.82rem;color:var(--muted);">No items found</p>'}
        <div class="total-row">
          <span>Total</span>
          <strong>£${total.toFixed(2)}</strong>
        </div>
      </div>

      <div class="summary-card">
        <div class="card-head">
          <div class="card-icon ci-o">📍</div>
          <h3>Delivery Info</h3>
        </div>
        <div class="info-row">
          <div class="info-icon">📍</div>
          <div>
            <div class="info-label">Delivery address</div>
            <div class="info-val">${order.address||"Not provided"}</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon">📞</div>
          <div>
            <div class="info-label">Contact</div>
            <div class="info-val">${order.phone||"Not provided"}</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon">💳</div>
          <div>
            <div class="info-label">Payment</div>
            <div class="info-val">${order.payment_method||"Online"}</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon">🕐</div>
          <div>
            <div class="info-label">Order placed at</div>
            <div class="info-val">${formatDate(order.created_at)}</div>
          </div>
        </div>
      </div>
    </div>

    ${adminPanel}`;

  // Animate the progress line after DOM paint
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      const fill = document.getElementById("stepsLineFill");
      if(fill) fill.style.width = linePct + "%";
    }, 100);
  });
}

/* ===== UPDATE STATUS (admin) ===== */
async function updateStatus(status){
  if(!currentOrderId) return;
  try{
    const res  = await fetch(`${API}/api/orders/${currentOrderId}/status`,{
      method:"PUT",
      headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},
      body:JSON.stringify({status})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.message||"Failed");
    showToast("Status updated to: "+status.replace("_"," ")+" ✓","success");
    renderTracking(data.order||data);
  }catch(err){
    showToast(err.message||"Update failed","error");
  }
}

/* ===== HELPERS ===== */
function formatTime(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");
}
function formatDate(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})+" "+formatTime(iso);
}
function showToast(msg,type="success"){
  const t=document.getElementById("toast");
  document.getElementById("toastMsg").textContent=msg;
  t.className="toast "+type+" show";
  setTimeout(()=>t.classList.remove("show"),3500);
}

/* ===== MOBILE SIDEBAR ===== */
function openMobileSidebar() {
  var sb = document.querySelector('.sidebar');
  var ov = document.getElementById('sidebarOverlay');
  if (sb) sb.style.cssText = 'display:flex !important; position:fixed; left:0; top:0; z-index:1000; height:100vh; animation:slideInSidebar 0.3s ease;';
  if (ov) ov.classList.add('show');
}
function closeMobileSidebar() {
  var sb = document.querySelector('.sidebar');
  var ov = document.getElementById('sidebarOverlay');
  if (sb) sb.style.cssText = '';
  if (ov) ov.classList.remove('show');
}

function logout(){ localStorage.clear(); location.href="login.html"; }
</script>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>
</body>
</html>
